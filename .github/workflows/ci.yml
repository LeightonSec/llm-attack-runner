name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # --require-hashes enforces the hash-locked dev lock at install time.
      # The lock is compiled on the 3.10 matrix floor (uv pip compile
      # --universal --python-version 3.10), so it installs across 3.10-3.12.
      # Flat-module app: no `pip install -e .`. tests/ is a package, so pytest's
      # prepend import mode resolves the root-level `from runner import ...`
      # imports without a pythonpath setting (see pyproject.toml).
      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt
      - name: Run tests
        run: pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned dependencies
        run: pip install --require-hashes -r requirements-dev.txt
      - name: Ruff
        run: ruff check .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # pip-audit runs as an isolated tool, never a project dependency, so its
      # own transitive stack can't pollute the graph it audits.
      - name: Install audit tooling
        run: pip install pip-audit
      - name: pip-audit (runtime + dev lockfiles)
        run: pip-audit --strict -r requirements.txt -r requirements-dev.txt
      # security-gate is SHA-pinned (not a tag/@main): the gate moves fast and a
      # SHA is reproducible and bumped deliberately.
      - name: Install security-gate (SHA-pinned)
        run: pip install "git+https://github.com/LeightonSec/security-gate.git@c52a8b56b3e164f9854c646bedb5d9e70446d98e"
      - name: Security gate
        run: security-gate scan .
